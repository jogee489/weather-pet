name: weather_pet
description: A weather app featuring a pet mascot that reacts to live weather conditions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Pet animations
  lottie: ^3.1.0

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Weather API
  http: ^1.2.1

  # Home screen widget
  home_widget: ^0.7.0

  # Persistence
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.3
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/cat/default/
    - assets/lottie/dog/default/
    - assets/lottie/dragon/default/
    - assets/lottie/frog/default/
